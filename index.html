<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Objeto 3D Interativo</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="canvas3d"></canvas>

      <div id="intro-screen">
        <div class="intro-box">
          <img src="./logo.png" alt="Logo" class="intro-logo" />
          <div class="intro-progress">
            <div id="intro-progress-bar" class="intro-progress-bar"></div>
          </div>
          <p id="intro-status">Carregando...</p>
          <button id="intro-start-btn" class="intro-start-btn">Toque para começar</button>
        </div>
      </div>

      <div id="hint" class="hint">
        Arraste para girar &middot; Toque nas peças para interagir
      </div>

      <div id="tooltip" class="tooltip"></div>

      <div id="info-panel" class="info-panel">
        <div class="info-panel-content">
          <span id="info-panel-title" class="info-panel-title"></span>
          <p id="info-panel-desc" class="info-panel-desc"></p>
        </div>
        <button id="info-panel-close" class="info-panel-close" aria-label="Fechar">×</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
